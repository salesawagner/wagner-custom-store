version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: whisparr_v3_server_1
      APP_PORT: 7069
      PROXY_AUTH_WHITELIST: "/api/*"

  server:
    image: ghcr.io/hotio/whisparr:v3
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${UMBREL_ROOT}/data/storage/downloads:/downloads
    restart: on-failure

  mac:
    image: https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSAskwrQSGfk_eT1GJBhT_QjCOoQhQFqlrGKA&s
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${UMBREL_ROOT}/data/storage/downloads:/downloads
    environment:
      APP_ID: "whisparr-v3"
      APP_URL: "http://whisparr_v3_server_1:6969"
      TRANSMISSION_HOST: "transmission_server_1"
      TRANSMISSION_PORT: 9091
      ROOT_FOLDER: "/downloads/xxx/movies"
      # optional qBittorrent download client
      QBITTORRENT_INSTALLED: ${APP_WHISPARR_V3_QBITTORRENT_INSTALLED:-"false"}
      QBITTORRENT_HOST: "qbittorrent_server_1"
      QBITTORRENT_PORT: 8080
      # optional SABnzbd download client
      SABNZBD_INSTALLED: ${APP_WHISPARR_V3_SABNZBD_INSTALLED:-"false"}
      SABNZBD_HOST: "sabnzbd_web_1"
      SABNZBD_PORT: 8080
      SABNZBD_API_KEY: ${APP_WHISPARR_V3_SABNZBD_API_KEY:-""}
